# .gitlab-ci.yml (Pipeline de Integración Continua)
# Este archivo le dice a GitLab qué hacer cada vez que subes código.

# 1. Definimos las etapas (stages) de nuestro pipeline.
# Por ahora empezamos solo con la etapa de "test".
stages:
  - test

# 2. Creamos el trabajo (job) que probará nuestro Backend.
test_backend:
  stage: test
  # Usamos una imagen oficial de Python pura y ligera, 
  # ya que los Runners de GitLab levantarán esto en un contenedor temporal.
  image: python:3.12-slim
  
  # Insertamos variables de entorno falsas para que Pydantic no aborte la app.
  # Estas solo existen durante los escasos segundos que dura el test.
  variables:
    DATABASE_URL: "postgresql://user:pass@localhost/test_db"
    SECRET_KEY: "supersecret-ci-testing-key"
    FRONTEND_URL: "http://localhost:3000"

  # Este bloque 'before_script' se ejecuta antes del script principal.
  # Es ideal para instalar dependencias.
  before_script:
    - cd backend  # Entramos a la carpeta de tu API
    # Instalamos las librerías necesarias (ignora warnings de root en docker)
    - pip install --no-cache-dir -r requirements.txt
    
  # Este es el comando real que determina si el Job pasa (verde) o falla (rojo)
  script:
    # Usamos `python -m pytest` en lugar de `pytest` directamente.
    # Esto agrega backend/ al sys.path, necesario para que los imports
    # `from tests.conftest import ...` de los archivos de test funcionen en CI.
    - python -m pytest tests -v
